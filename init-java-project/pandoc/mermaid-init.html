<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  (function () {
    var css = getComputedStyle(document.documentElement);
    var v = function (name) { return css.getPropertyValue(name).trim(); };
    var dark = window.matchMedia
      && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var line = v('--figure-line');
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      darkMode: dark,
      themeVariables: {
        darkMode: dark,
        fontFamily: v('--font-family-prose'),
        background: v('--figure-bg'),
        mainBkg: v('--figure-fill-1'),
        primaryColor: v('--figure-fill-1'),
        primaryBorderColor: v('--figure-border-1'),
        primaryTextColor: v('--figure-text'),
        secondaryColor: v('--figure-fill-2'),
        secondaryBorderColor: v('--figure-border-2'),
        secondaryTextColor: v('--figure-text'),
        tertiaryColor: v('--figure-fill-3'),
        tertiaryBorderColor: v('--figure-border-3'),
        tertiaryTextColor: v('--figure-text'),
        lineColor: line,
        defaultLinkColor: line,
        arrowheadColor: line,
        textColor: v('--figure-text'),
        nodeTextColor: v('--figure-text'),
        edgeLabelBackground: v('--figure-bg'),
        labelBackground: v('--figure-bg'),
        labelTextColor: v('--figure-text'),
        noteBkgColor: v('--figure-fill-3'),
        noteBorderColor: v('--figure-border-3'),
        noteTextColor: v('--figure-text'),
        clusterBkg: v('--figure-surface'),
        clusterBorder: v('--figure-border-1'),
        quadrant1Fill: v('--figure-accent-fill'),
        quadrant2Fill: v('--figure-fill-2'),
        quadrant3Fill: v('--figure-fill-1'),
        quadrant4Fill: v('--figure-fill-4'),
        quadrant1TextFill: v('--figure-text'),
        quadrant2TextFill: v('--figure-text'),
        quadrant3TextFill: v('--figure-text'),
        quadrant4TextFill: v('--figure-text'),
        quadrantPointFill: v('--figure-accent-border'),
        quadrantPointTextFill: v('--figure-text'),
        quadrantXAxisTextFill: v('--figure-text'),
        quadrantYAxisTextFill: v('--figure-text'),
        quadrantTitleFill: v('--figure-text'),
        quadrantInternalBorderStrokeFill: v('--figure-line'),
        quadrantExternalBorderStrokeFill: v('--figure-line')
      }
    });
  })();
</script>
